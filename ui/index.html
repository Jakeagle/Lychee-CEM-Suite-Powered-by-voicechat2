<!DOCTYPE html>
<html>
<head>
    <title>Bones Live</title>
    <style>
        body { background: #0a0a0a; color: #00ff99; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat { width: 85%; height: 65%; border: 2px solid #1a1a1a; overflow-y: auto; padding: 25px; background: #000; border-radius: 15px; box-shadow: 0 0 30px rgba(0,255,153,0.1); }
        .msg { margin-bottom: 15px; line-height: 1.4; }
        .user { color: #666; }
        .bones { color: #00ff99; font-weight: bold; }
        #mic { width: 90px; height: 90px; border-radius: 50%; border: none; background: #1a1a1a; color: white; font-size: 35px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        #mic.active { background: #ff4444; box-shadow: 0 0 20px #ff4444; }
    </style>
</head>
<body>
    <h1>CEM LIVE FEED</h1>
    <div id="chat"></div>
    <button id="mic">🎙️</button>
<script>
    const ws = new WebSocket(`ws://${window.location.host}/ws`);
    const chat = document.getElementById('chat');
    const mic = document.getElementById('mic');
    let mediaRecorder;
    let audioQueue = [];
    let isPlaying = false;

    // This helper creates the message bubbles
    function addMessage(text, isBones = true, id = null) {
        const div = document.createElement('div');
        div.className = isBones ? 'msg bones' : 'msg user';
        if (id) div.id = id;
        div.innerText = (isBones ? "BONES: " : "YOU: ") + text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    async function playQueue() {
        if (isPlaying || audioQueue.length === 0) return;
        isPlaying = true;
        const blob = audioQueue.shift();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.onended = () => { isPlaying = false; playQueue(); };
        await audio.play();
    }

    ws.onmessage = async (e) => {
        if (e.data instanceof Blob) {
            audioQueue.push(e.data);
            playQueue();
        } else {
            const data = JSON.parse(e.data);
            
            // 1. Handle the User's speech appearing
            if(data.type === "transcription") {
                addMessage(data.text, false);
            }
            
            // 2. Handle Bones's streaming text chunks
            if(data.type === "text_chunk") {
                let bonesDiv = document.getElementById('current-response');
                if (!bonesDiv) {
                    // Create the bubble if it doesn't exist yet
                    bonesDiv = addMessage("", true, 'current-response');
                }
                // Append the new token/word to the bubble
                bonesDiv.innerText += data.text;
            }
        }
    };

    mic.onclick = async () => {
        if (mediaRecorder?.state === "recording") {
            mediaRecorder.stop();
            mic.classList.remove('active');
        } else {
            // Clear the "current-response" ID from the last turn so a new bubble starts
            document.getElementById('current-response')?.removeAttribute('id');
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => ws.send(new Blob(chunks));
            mediaRecorder.start();
            mic.classList.add('active');
        }
    };
</script>
</body>
</html>
